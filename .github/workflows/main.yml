name: Generate Datas

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

# THIS IS THE NEW BLOCK THAT FIXES THE ERROR
permissions:
  contents: write

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      - uses: platane/snk@v3
        with:
          # github user name to read the contribution graph from
          github_user_name: ${{ github.repository_owner }}
          # output files
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          # THIS IS WHERE MY_PAT GOES: It gives the snake script access to read your private graph
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          # This goes back to the default token, which is used just to push the file to the repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
